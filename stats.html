<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal Statistics – Fibonacci Gold Signal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 22px; }
    .title { font-size: 16px; font-weight: 700; color: #FFD700; }
    .sub   { font-size: 12px; color: #8b949e; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .btn-back {
      padding: 6px 14px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .btn-back:hover { background: #2d333b; }
    .btn-clear {
      padding: 6px 14px;
      background: #2a0d0d;
      border: 1px solid #da3633;
      border-radius: 6px;
      color: #f85149;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .btn-clear:hover { background: #3d1111; }

    /* ── Page content ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 20px 24px 40px; }

    /* ── Section title ── */
    .section-heading {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: #8b949e;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #21262d;
    }

    /* ── Summary strip ── */
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 14px 16px;
      text-align: center;
    }
    .summary-card.highlight { border-color: #FFD700; background: #1a1a0d; }
    .summary-value { font-size: 22px; font-weight: 700; line-height: 1.2; }
    .summary-label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #8b949e; margin-top: 4px; }

    /* ── Per-indicator cards ── */
    .indicator-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }
    @media (max-width: 720px) {
      .indicator-grid { grid-template-columns: 1fr 1fr; }
      .summary-strip  { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 480px) {
      .indicator-grid { grid-template-columns: 1fr; }
      .summary-strip  { grid-template-columns: 1fr 1fr; }
    }

    .ind-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 14px 14px 12px;
      transition: border-color .15s;
    }
    .ind-card:hover { border-color: #30363d; }
    .ind-card-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .ind-icon { font-size: 18px; }
    .ind-name { font-size: 13px; font-weight: 700; flex: 1; }
    .ind-total { font-size: 11px; color: #8b949e; }

    /* Win-rate ring (pure CSS) */
    .ring-wrap {
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
    }
    .ring {
      position: relative;
      width: 70px; height: 70px;
    }
    .ring svg { transform: rotate(-90deg); }
    .ring-track { fill: none; stroke: #21262d; stroke-width: 7; }
    .ring-fill  { fill: none; stroke-width: 7; stroke-linecap: round;
                  transition: stroke-dashoffset .6s ease; }
    .ring-label {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
    }
    .ring-pct  { font-size: 14px; font-weight: 700; line-height: 1; }
    .ring-sub  { font-size: 9px; color: #8b949e; margin-top: 2px; }

    /* Stats rows inside indicator card */
    .ind-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px; }
    .ind-stat  { }
    .ind-stat-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: .4px; color: #8b949e; }
    .ind-stat-val { font-size: 12px; font-weight: 600; }

    /* Tiny win/loss bar */
    .wl-bar { display: flex; height: 4px; border-radius: 2px; overflow: hidden; margin: 8px 0; }
    .wl-win  { background: #238636; transition: width .4s; }
    .wl-loss { background: #da3633; flex: 1; }

    /* ── Signal table ── */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid #21262d;
      border-radius: 10px;
    }
    table.signal-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 660px;
    }
    table.signal-table th {
      background: #161b22;
      color: #8b949e;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 9px 12px;
      text-align: left;
      border-bottom: 1px solid #21262d;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    table.signal-table th:hover { color: #e6edf3; }
    table.signal-table th .sort-arrow { margin-left: 4px; opacity: .4; }
    table.signal-table th.sorted .sort-arrow { opacity: 1; }
    table.signal-table td {
      padding: 8px 12px;
      border-bottom: 1px solid #161b22;
      font-size: 12px;
      white-space: nowrap;
    }
    table.signal-table tbody tr:last-child td { border-bottom: none; }
    table.signal-table tbody tr:hover td { background: #161b22; }

    .outcome-chip {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 50%;
      font-size: 11px; font-weight: 700;
    }
    .oc-win     { background: rgba(63,185,80,.2);    color: #3fb950; }
    .oc-loss    { background: rgba(248,81,73,.2);    color: #f85149; }
    .oc-pending { background: rgba(139,148,158,.15); color: #8b949e; }

    .type-badge {
      font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 10px; letter-spacing: .3px;
    }
    .tb-buy  { background: #238636; color: #fff; }
    .tb-sell { background: #da3633; color: #fff; }

    .pnl-pos { color: #3fb950; font-weight: 600; }
    .pnl-neg { color: #f85149; font-weight: 600; }
    .pnl-neu { color: #8b949e; }

    .str-bar {
      display: inline-block; height: 6px; border-radius: 3px;
      margin-right: 4px; vertical-align: middle;
    }

    /* ── Filter row ── */
    .filter-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; flex-wrap: wrap;
    }
    .filter-label { font-size: 11px; color: #8b949e; }
    .filter-btn {
      padding: 4px 10px;
      border: 1px solid #30363d;
      border-radius: 20px;
      background: #0d1117;
      color: #8b949e;
      font-size: 11px; font-weight: 600;
      cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
    }
    .filter-btn.active {
      background: #1c2a3a; color: #58a6ff; border-color: #58a6ff;
    }
    .filter-btn:hover:not(.active) { background: #161b22; color: #e6edf3; }

    /* Search input */
    .search-input {
      margin-left: auto;
      padding: 4px 10px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      color: #e6edf3;
      font-size: 11px;
      outline: none;
      width: 160px;
    }
    .search-input:focus { border-color: #58a6ff; }
    .search-input::placeholder { color: #8b949e; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #8b949e;
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 13px; line-height: 1.6; }

    /* ── Best / Worst highlight row ── */
    tr.is-best td  { background: rgba(35,134,54,.06) !important; }
    tr.is-worst td { background: rgba(218,54,51,.06) !important; }

    /* ── Pagination ── */
    .pagination {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 14px 0 0;
    }
    .pg-btn {
      padding: 4px 10px;
      background: #161b22; border: 1px solid #21262d; border-radius: 5px;
      color: #8b949e; font-size: 11px; cursor: pointer;
    }
    .pg-btn:hover { background: #21262d; color: #e6edf3; }
    .pg-btn.active { background: #1c2a3a; border-color: #58a6ff; color: #58a6ff; }
    .pg-info { font-size: 11px; color: #8b949e; margin: 0 6px; }

    /* ── Loading spinner ── */
    #loadingOverlay {
      position: fixed; inset: 0;
      background: #0d1117;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 200;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #21262d; border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: #8b949e; }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">İstatistikler yükleniyor…</div>
</div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">📈</div>
    <div>
      <div class="title">Signal Statistics</div>
      <div class="sub">XAU/USD – Per-indicator performance</div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn-clear" id="btnClear">🗑 Geçmişi Sil</button>
    <button class="btn-back" id="btnBack">← Dashboard</button>
  </div>
</div>

<!-- Page content -->
<div class="page" id="page" style="display:none">

  <!-- ── Summary strip ─────────────────────────────── -->
  <div style="margin-bottom:16px">
    <div class="section-heading">📊 Genel Özet</div>
    <div class="summary-strip" id="summaryStrip"></div>
  </div>

  <!-- ── Per-indicator cards ──────────────────────── -->
  <div style="margin-bottom:24px">
    <div class="section-heading">🔍 İndikatör Bazlı İstatistikler</div>
    <div class="indicator-grid" id="indicatorGrid"></div>
  </div>

  <!-- ── Signal history table ─────────────────────── -->
  <div>
    <div class="section-heading">📜 Sinyal Geçmişi</div>

    <!-- Filter row -->
    <div class="filter-row" id="filterRow">
      <span class="filter-label">Filtre:</span>
      <button class="filter-btn active" data-filter="all">Tümü</button>
      <button class="filter-btn" data-filter="win">✓ Kazanan</button>
      <button class="filter-btn" data-filter="loss">✗ Kaybeden</button>
      <button class="filter-btn" data-filter="pending">⏳ Bekleyen</button>
      <button class="filter-btn" data-filter="BUY">BUY</button>
      <button class="filter-btn" data-filter="SELL">SELL</button>
      <input class="search-input" id="searchInput" type="text" placeholder="🔍 İndikatör ara…">
    </div>

    <div class="table-wrap">
      <table class="signal-table">
        <thead>
          <tr>
            <th data-col="outcome">Sonuç <span class="sort-arrow">↕</span></th>
            <th data-col="time">Tarih <span class="sort-arrow">↕</span></th>
            <th data-col="indicatorName">İndikatör <span class="sort-arrow">↕</span></th>
            <th data-col="type">Tip <span class="sort-arrow">↕</span></th>
            <th data-col="price">Giriş Fiyatı <span class="sort-arrow">↕</span></th>
            <th data-col="outcomePrice">Çıkış Fiyatı <span class="sort-arrow">↕</span></th>
            <th data-col="pnlAbs">P&amp;L ($) <span class="sort-arrow">↕</span></th>
            <th data-col="pnlPct">P&amp;L (%) <span class="sort-arrow">↕</span></th>
            <th data-col="strength">Güç <span class="sort-arrow">↕</span></th>
          </tr>
        </thead>
        <tbody id="signalTableBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

</div>

<script src="stats.js"></script>
</body>
</html>
