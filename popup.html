<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fibonacci Gold Signal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      min-height: 400px;
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1c2a1c 0%, #1a2a14 100%);
      padding: 14px 16px 10px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon { font-size: 24px; }
    .header-title { font-size: 15px; font-weight: 700; color: #FFD700; }
    .header-sub   { font-size: 11px; color: #8b949e; }

    /* ── Price block ── */
    .price-block {
      padding: 14px 16px;
      border-bottom: 1px solid #21262d;
    }
    .price-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
    .price-value { font-size: 28px; font-weight: 700; color: #FFD700; letter-spacing: -0.5px; }
    .price-update { font-size: 11px; color: #8b949e; margin-top: 3px; }

    /* ── Signal banner ── */
    .signal-block {
      margin: 12px 16px;
      padding: 10px 12px;
      border-radius: 8px;
      display: none;
    }
    .signal-block.buy  { background: #0d2a1f; border: 1px solid #238636; }
    .signal-block.sell { background: #2a0d0d; border: 1px solid #da3633; }
    .signal-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }
    .signal-block.buy  .signal-badge { background: #238636; color: #fff; }
    .signal-block.sell .signal-badge { background: #da3633; color: #fff; }
    .signal-msg  { font-size: 12px; color: #c9d1d9; line-height: 1.4; }
    .signal-time { font-size: 11px; color: #8b949e; margin-top: 4px; }

    /* ── Fibonacci levels ── */
    .section-title {
      padding: 8px 16px 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #8b949e;
      border-top: 1px solid #21262d;
    }
    .fib-grid {
      padding: 4px 16px 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
    }
    .fib-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
    }
    .fib-label { color: #8b949e; font-size: 12px; }
    .fib-price { font-size: 12px; font-weight: 600; color: #e6edf3; }
    .fib-row.key .fib-label { color: #FFD700; }
    .fib-row.key .fib-price { color: #FFD700; }

    /* ── Buttons ── */
    .btn-row {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      border-top: 1px solid #21262d;
    }
    .btn {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary   { background: #238636; color: #fff; }
    .btn-secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    .btn-stats     { background: #1c2a3a; color: #58a6ff; border: 1px solid #1f6feb; }

    /* ── Loading / error ── */
    .status-msg {
      text-align: center;
      padding: 30px 16px;
      color: #8b949e;
      font-size: 13px;
    }
    /* ── Signal cards ── */
    .signals-section { border-top: 1px solid #21262d; padding: 4px 0 2px; }

    .signal-card {
      margin: 3px 8px;
      border: 1px solid #21262d;
      border-radius: 8px;
      overflow: hidden;
      background: #161b22;
    }
    .signal-card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      cursor: pointer;
      user-select: none;
    }
    .signal-card-header:hover { background: #1c2128; }
    .signal-chevron {
      font-size: 9px;
      color: #8b949e;
      transition: transform .18s;
      flex-shrink: 0;
    }
    .signal-card.open .signal-chevron { transform: rotate(90deg); }
    .signal-card-name { flex: 1; font-size: 12px; font-weight: 600; color: #e6edf3; }
    .signal-type-badge {
      font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 10px; letter-spacing: .3px;
    }
    .badge-buy     { background: #238636; color: #fff; }
    .badge-sell    { background: #da3633; color: #fff; }
    .badge-neutral { background: #30363d; color: #8b949e; }

    .signal-card-body {
      display: none;
      padding: 0 10px 9px;
      border-top: 1px solid #21262d;
    }
    .signal-card.open .signal-card-body { display: block; }

    .signal-card-msg {
      font-size: 11px; color: #c9d1d9; line-height: 1.5; padding: 6px 0 4px;
    }

    /* Strength bar */
    .strength-row {
      display: flex; align-items: center; gap: 6px; margin: 2px 0 7px;
    }
    .strength-label { font-size: 10px; color: #8b949e; flex-shrink: 0; }
    .strength-bar-track {
      flex: 1; height: 4px; background: #21262d; border-radius: 2px; overflow: hidden;
    }
    .strength-bar-fill { height: 100%; border-radius: 2px; transition: width .3s; }
    .strength-pct { font-size: 10px; color: #8b949e; flex-shrink: 0; min-width: 26px; text-align: right; }

    /* Notify row */
    .notify-row {
      display: flex; align-items: center; gap: 6px;
      padding-top: 6px; border-top: 1px solid #21262d;
    }
    .notify-label { font-size: 11px; color: #8b949e; flex: 1; }

    /* Toggle switch */
    .toggle { position: relative; width: 28px; height: 16px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: #21262d; border-radius: 8px; cursor: pointer; transition: background .2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 12px; height: 12px; left: 2px; top: 2px;
      background: #8b949e; border-radius: 50%;
      transition: transform .2s, background .2s;
    }
    .toggle input:checked + .toggle-slider { background: #238636; }
    .toggle input:checked + .toggle-slider::before {
      transform: translateX(12px); background: #fff;
    }

    /* Threshold input */
    .threshold-row { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
    .threshold-lbl { font-size: 11px; color: #8b949e; }
    .threshold-input {
      width: 38px; padding: 2px 4px;
      background: #0d1117; border: 1px solid #30363d; border-radius: 4px;
      color: #e6edf3; font-size: 11px; text-align: center;
    }
    .threshold-input:focus { outline: none; border-color: #58a6ff; }
    .threshold-input:disabled { opacity: .4; cursor: not-allowed; }
    .threshold-unit { font-size: 11px; color: #8b949e; }

    /* ── Interval bar ── */
    .interval-bar {
      display: flex;
      gap: 4px;
      padding: 8px 12px 6px;
      background: #161b22;
      border-bottom: 1px solid #21262d;
    }
    .interval-btn {
      flex: 1;
      padding: 4px 0;
      border: 1px solid #30363d;
      border-radius: 5px;
      background: #0d1117;
      color: #8b949e;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }
    .interval-btn:hover { background: #21262d; color: #e6edf3; }
    .interval-btn.active {
      background: #1c2a3a;
      color: #58a6ff;
      border-color: #58a6ff;
    }

    /* ── Scrollable content ── */
    #content {
      max-height: 480px;
      overflow-y: auto;
    }

    /* ── Error block ── */
    .error-block {
      margin: 12px 16px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #2a0d0d;
      border: 1px solid #da3633;
      color: #f85149;
      font-size: 12px;
      line-height: 1.5;
    }

    /* ── Live dot ── */
    .live-dot {
      width: 8px; height: 8px;
      background: #3fb950;
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(63,185,80,.5); }
      50%       { opacity: .6; transform: scale(.75); box-shadow: 0 0 0 4px rgba(63,185,80,0); }
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      background: #161b22;
      border-bottom: 1px solid #21262d;
    }
    .stat-item { flex: 1; text-align: center; }
    .stat-value {
      font-size: 14px; font-weight: 700; line-height: 1.2;
    }
    .stat-label {
      font-size: 9px; text-transform: uppercase; letter-spacing: .4px;
      color: #8b949e; margin-top: 1px;
    }
    .stat-divider { width: 1px; height: 28px; background: #30363d; flex-shrink: 0; }

    /* ── Price change ── */
    .price-change {
      font-size: 12px; font-weight: 600; margin-top: 2px;
    }
    .price-change.up   { color: #3fb950; }
    .price-change.down { color: #f85149; }
    .price-change.flat { color: #8b949e; }

    /* ── Market session badge ── */
    .session-badge {
      display: inline-block;
      padding: 2px 7px; border-radius: 10px;
      font-size: 10px; font-weight: 600;
      margin-top: 4px;
    }

    /* ── Signal history ── */
    .history-list {
      padding: 2px 8px 6px;
      max-height: 220px;
      overflow-y: auto;
    }
    .history-item {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 4px;
      border-bottom: 1px solid #21262d;
    }
    .history-item:last-child { border-bottom: none; }
    .history-outcome {
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .outcome-win     { background: rgba(63,185,80,.2);    color: #3fb950; }
    .outcome-loss    { background: rgba(248,81,73,.2);    color: #f85149; }
    .outcome-pending { background: rgba(139,148,158,.15); color: #8b949e; }
    .history-info  { flex: 1; min-width: 0; }
    .history-name  {
      font-size: 11px; font-weight: 600; color: #e6edf3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-time  { font-size: 10px; color: #8b949e; }
    .history-right {
      display: flex; flex-direction: column; align-items: flex-end;
      gap: 2px; flex-shrink: 0;
    }
    .history-price    { font-size: 10px; color: #8b949e; }
    .history-strength { font-size: 10px; color: #58a6ff; }

    /* ── Summary signal consensus ── */
    .consensus-row {
      display: flex; gap: 3px; padding: 8px 16px 4px; align-items: center;
    }
    .consensus-label { font-size: 11px; color: #8b949e; flex-shrink: 0; margin-right: 4px; }
    .consensus-bar   { flex: 1; height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; }
    .consensus-fill  { height: 100%; border-radius: 3px; transition: width .3s; }
    .consensus-pct   { font-size: 11px; font-weight: 600; min-width: 30px; text-align: right; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">📊</div>
    <div style="flex:1">
      <div class="header-title">Fibonacci Gold Signal</div>
      <div class="header-sub">XAU/USD • Real-time analysis</div>
    </div>
    <div class="live-dot" title="Live"></div>
  </div>

  <!-- Timeframe selector -->
  <div class="interval-bar" id="intervalBar">
    <button class="interval-btn" data-interval="1m">1m</button>
    <button class="interval-btn" data-interval="5m">5m</button>
    <button class="interval-btn" data-interval="15m">15m</button>
    <button class="interval-btn" data-interval="30m">30m</button>
    <button class="interval-btn active" data-interval="1h">1h</button>
    <button class="interval-btn" data-interval="1d">1d</button>
  </div>

  <!-- Content -->
  <div id="content">
    <div class="status-msg" id="loading">Loading data…</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
