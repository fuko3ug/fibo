<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fibonacci Gold Signal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      min-height: 400px;
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1c2a1c 0%, #1a2a14 100%);
      padding: 14px 16px 10px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon { font-size: 24px; }
    .header-title { font-size: 15px; font-weight: 700; color: #FFD700; }
    .header-sub   { font-size: 11px; color: #8b949e; }

    /* ── Price block ── */
    .price-block {
      padding: 14px 16px;
      border-bottom: 1px solid #21262d;
    }
    .price-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
    .price-value { font-size: 28px; font-weight: 700; color: #FFD700; letter-spacing: -0.5px; }
    .price-update { font-size: 11px; color: #8b949e; margin-top: 3px; }

    /* ── Signal banner ── */
    .signal-block {
      margin: 12px 16px;
      padding: 10px 12px;
      border-radius: 8px;
      display: none;
    }
    .signal-block.buy  { background: #0d2a1f; border: 1px solid #238636; }
    .signal-block.sell { background: #2a0d0d; border: 1px solid #da3633; }
    .signal-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }
    .signal-block.buy  .signal-badge { background: #238636; color: #fff; }
    .signal-block.sell .signal-badge { background: #da3633; color: #fff; }
    .signal-msg  { font-size: 12px; color: #c9d1d9; line-height: 1.4; }
    .signal-time { font-size: 11px; color: #8b949e; margin-top: 4px; }

    /* ── Fibonacci levels ── */
    .section-title {
      padding: 8px 16px 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #8b949e;
      border-top: 1px solid #21262d;
    }
    .fib-grid {
      padding: 4px 16px 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
    }
    .fib-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
    }
    .fib-label { color: #8b949e; font-size: 12px; }
    .fib-price { font-size: 12px; font-weight: 600; color: #e6edf3; }
    .fib-row.key .fib-label { color: #FFD700; }
    .fib-row.key .fib-price { color: #FFD700; }

    /* ── Buttons ── */
    .btn-row {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      border-top: 1px solid #21262d;
    }
    .btn {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #238636; color: #fff; }
    .btn-secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }

    /* ── Loading / error ── */
    .status-msg {
      text-align: center;
      padding: 30px 16px;
      color: #8b949e;
      font-size: 13px;
    }
    .no-signal {
      margin: 12px 16px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #161b22;
      border: 1px solid #21262d;
      color: #8b949e;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">📊</div>
    <div>
      <div class="header-title">Fibonacci Gold Signal</div>
      <div class="header-sub">XAU/USD • Real-time analysis</div>
    </div>
  </div>

  <!-- Content -->
  <div id="content">
    <div class="status-msg" id="loading">Loading data…</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
